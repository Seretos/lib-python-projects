name: open-dep-ticket

# Manual recovery workflow: re-open the dependency-update ticket in both
# downstream consumer repos (Seretos/agent-project-issues and
# Seretos/workboard) when the automatic steps in release.yml were skipped
# or failed (e.g. missing token at release time).
#
# Design: independence + failure visibility.
#   - The semver validation step runs first with no continue-on-error; an
#     invalid version halts the job before any ticket is filed.
#   - Each consumer step carries continue-on-error: true so a broken token
#     for one consumer never prevents the other from attempting.
#   - A final "Report consumer failures" step (if: always()) inspects both
#     outcomes and exits non-zero if either failed, turning the job red and
#     naming exactly which token needs attention. This means the workflow
#     run summary will show a failure whenever ticket creation broke for
#     any consumer, while still guaranteeing both consumers always attempt.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "lib-python-projects version to reference (semver, no leading v) e.g. 0.2.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  file-tickets:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Validate version is semver
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "ERROR: version must be semver without a leading 'v' (e.g. 0.2.0), got: $VERSION"
            exit 1
          fi

      - name: Open dependency-update ticket in agent-project-issues
        id: file_projects
        continue-on-error: true
        shell: bash
        # TITLE/BODY live in env (not a run-block heredoc): a heredoc body at
        # column 0 dedents out of the YAML block scalar and breaks the file.
        # A YAML block scalar holds the markdown verbatim and ${{ }} still
        # expands. Bash just references "$TITLE"/"$BODY".
        env:
          # PROJECTS_TICKET_TOKEN needs Issues:write on the consumer repo and,
          # additionally, account-level Projects:write so the board-add step
          # below can reuse this same token (no separate board secret).
          GH_TOKEN: ${{ secrets.PROJECTS_TICKET_TOKEN }}
          TITLE: "chore(deps): bump lib-python-projects to v${{ inputs.version }}"
          BODY: |
            ## Dependency update

            A new release of **lib-python-projects** has been published: `v${{ inputs.version }}`.

            ### Action required

            1. Locate where `lib-python-projects` is pinned in this repository
               (e.g. `pyproject.toml`, `requirements.txt`, `backend/requirements.txt`, `setup.cfg`)
               and update the pin to:
               ```
               lib-python-projects @ git+https://github.com/Seretos/lib-python-projects@v${{ inputs.version }}
               ```
            2. Run the project's own test suite to verify nothing is broken.
            3. If the project has a build step, confirm the build succeeds.
            4. Commit and open a PR.
        run: |
          CONSUMER="Seretos/agent-project-issues"

          # Idempotency: skip if an open issue with this exact title already
          # exists — reuse its URL instead of creating a duplicate.
          # --paginate follows all pages; jq filter excludes pull requests.
          ISSUE_URL=$(gh api --paginate "repos/${CONSUMER}/issues?state=open&per_page=100" \
            --jq --arg t "$TITLE" 'map(select((.pull_request|not) and (.title==$t))) | .[0].html_url // empty' 2>/dev/null || true)
          if [ -n "$ISSUE_URL" ]; then
            echo "Issue already exists in ${CONSUMER}, skipping."
          else
            # Attempt creation with the 'dependencies' label; fall back
            # without it if the label does not exist in the consumer repo.
            ISSUE_URL=$(gh issue create \
              --repo "$CONSUMER" \
              --title "$TITLE" \
              --body "$BODY" \
              --label dependencies \
            || gh issue create \
              --repo "$CONSUMER" \
              --title "$TITLE" \
              --body "$BODY")
            echo "Ticket opened in ${CONSUMER}: ${ISSUE_URL}"
          fi
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"

      - name: Add agent-project-issues ticket to project board
        # Reuses PROJECTS_TICKET_TOKEN, which also carries account-level
        # Projects:write, so no separate board secret is needed.
        if: steps.file_projects.outputs.issue_url != ''
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TICKET_TOKEN }}
        run: |
          gh project item-add 2 --owner Seretos --url "${{ steps.file_projects.outputs.issue_url }}"

      - name: Open dependency-update ticket in workboard
        id: file_workboard
        continue-on-error: true
        shell: bash
        # TITLE/BODY live in env (not a run-block heredoc): a heredoc body at
        # column 0 dedents out of the YAML block scalar and breaks the file.
        # A YAML block scalar holds the markdown verbatim and ${{ }} still
        # expands. Bash just references "$TITLE"/"$BODY".
        env:
          # WORKBOARD_TICKET_TOKEN needs Issues:write on the consumer repo and,
          # additionally, account-level Projects:write so the board-add step
          # below can reuse this same token (no separate board secret).
          GH_TOKEN: ${{ secrets.WORKBOARD_TICKET_TOKEN }}
          TITLE: "chore(deps): bump lib-python-projects to v${{ inputs.version }}"
          BODY: |
            ## Dependency update

            A new release of **lib-python-projects** has been published: `v${{ inputs.version }}`.

            ### Action required

            1. Locate where `lib-python-projects` is pinned in this repository
               (e.g. `pyproject.toml`, `requirements.txt`, `backend/requirements.txt`, `setup.cfg`)
               and update the pin to:
               ```
               lib-python-projects @ git+https://github.com/Seretos/lib-python-projects@v${{ inputs.version }}
               ```
            2. Run the project's own test suite to verify nothing is broken.
            3. If the project has a build step, confirm the build succeeds.
            4. Commit and open a PR.
        run: |
          CONSUMER="Seretos/workboard"

          # Idempotency: skip if an open issue with this exact title already
          # exists — reuse its URL instead of creating a duplicate.
          # --paginate follows all pages; jq filter excludes pull requests.
          ISSUE_URL=$(gh api --paginate "repos/${CONSUMER}/issues?state=open&per_page=100" \
            --jq --arg t "$TITLE" 'map(select((.pull_request|not) and (.title==$t))) | .[0].html_url // empty' 2>/dev/null || true)
          if [ -n "$ISSUE_URL" ]; then
            echo "Issue already exists in ${CONSUMER}, skipping."
          else
            # Attempt creation with the 'dependencies' label; fall back
            # without it if the label does not exist in the consumer repo.
            ISSUE_URL=$(gh issue create \
              --repo "$CONSUMER" \
              --title "$TITLE" \
              --body "$BODY" \
              --label dependencies \
            || gh issue create \
              --repo "$CONSUMER" \
              --title "$TITLE" \
              --body "$BODY")
            echo "Ticket opened in ${CONSUMER}: ${ISSUE_URL}"
          fi
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"

      - name: Add workboard ticket to project board
        # Reuses WORKBOARD_TICKET_TOKEN, which also carries account-level
        # Projects:write, so no separate board secret is needed.
        if: steps.file_workboard.outputs.issue_url != ''
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.WORKBOARD_TICKET_TOKEN }}
        run: |
          gh project item-add 2 --owner Seretos --url "${{ steps.file_workboard.outputs.issue_url }}"

      - name: Report consumer failures
        if: always()
        shell: bash
        run: |
          failed=0
          if [ "${{ steps.file_projects.outcome }}" = "failure" ]; then
            echo "::error::Filing in Seretos/agent-project-issues failed (check PROJECTS_TICKET_TOKEN)."
            failed=1
          fi
          if [ "${{ steps.file_workboard.outcome }}" = "failure" ]; then
            echo "::error::Filing in Seretos/workboard failed (check WORKBOARD_TICKET_TOKEN)."
            failed=1
          fi
          exit $failed
